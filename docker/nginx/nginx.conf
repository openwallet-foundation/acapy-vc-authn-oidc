events {
    worker_connections 1024;
}

http {
    upstream controller {
	server controller:5000;
	ip_hash;
    }

    server {
	listen 80;

	location / {
	    proxy_pass http://controller;
	    proxy_set_header Host $host;
	    proxy_set_header X-Real-IP $remote_addr;
	    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	    proxy_set_header X-Forwarded-Proto $scheme;

	    # SSE (Server-Sent Events) support
	    proxy_http_version 1.1;
	    proxy_buffering off;

	    # Timeout settings
	    proxy_connect_timeout 60s;
	    proxy_send_timeout 60s;
	    # SSE connections are long-lived; keepalive comments are sent every 30s
	    # to keep the connection alive, but set a generous read timeout as a
	    # safety net for any intermediate network hops that ignore keepalives.
	    proxy_read_timeout 3600s;
	}
    }
}
